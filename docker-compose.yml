# ============================================================
# DeepAgent Chat — Docker Compose
# ============================================================
# 使用方式：
#   1. 创建 .env 文件（将 .env.example 复制为 .env 并填入实际值）
#   2. docker compose up -d
#   3. 访问 http://localhost:5000
#
# 默认使用 SQLite（数据持久化在 volumes 中）。
# 如需 MySQL，取消下面 mysql 服务的注释，并将 DATABASE_URL 改为 mysql 连接。
# ============================================================

services:
  # ── Web 服务 ─────────────────────────────────────────────────
  web:
    build: .
    container_name: deepagent-web
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      # SQLite（默认）
      # - DATABASE_URL=sqlite:////data/instance/app.db
      # MySQL（取消注释后使用）
      - DATABASE_URL=mysql+pymysql://chat:EZLy2Y4Ccb5HRLGR@192.168.1.79:3306/deepagent?charset=utf8mb4
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@deepagent.local}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - ZHIPU_VISION_MODEL=${ZHIPU_VISION_MODEL:-glm-4v-flash}
      - ZHIPU_IMAGE_MODEL=${ZHIPU_IMAGE_MODEL:-cogview-3-flash}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - QUERY_EMBEDDING_MODEL=${QUERY_EMBEDDING_MODEL:-}
      - QUERY_EMBEDDING_API_KEY=${QUERY_EMBEDDING_API_KEY:-}
      - QUERY_EMBEDDING_API_BASE=${QUERY_EMBEDDING_API_BASE:-}
    # 沙箱目录使用 tmpfs（内存文件系统），容器停止后自动清空
    tmpfs:
      - /app/sandbox:size=100M,uid=1000,gid=1000
    # 删除所有特权能力，只保留绑定端口的最小权限
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    volumes:
      - web_data:/data
    networks:
      - deepagent-net

  # ── MySQL（可选） ─────────────────────────────────────────────
  # 使用前：
  #   1. 取消 web 服务中 DATABASE_URL 的 MySQL 注释
  #   2. docker compose --profile mysql up -d
  #
  mysql:
    image: mysql:8.0
    container_name: deepagent-mysql
    restart: unless-stopped
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: deepagent
      MYSQL_USER: deepagent
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deepagent}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - deepagent-net

volumes:
  web_data:
  mysql_data:

networks:
  deepagent-net:
    driver: bridge
