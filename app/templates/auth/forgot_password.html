{% extends "base.html" %}
{% block title %}忘记密码{% endblock %}
{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><i class="fas fa-key"></i></div>
        <p class="subtitle">输入您的注册邮箱，我们将发送密码重置链接</p>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                {{ form.email(class="form-control", placeholder="your@email.com") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="auth-link">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}
