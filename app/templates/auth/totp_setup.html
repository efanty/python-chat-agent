{% extends "base.html" %}
{% block title %}设置TOTP{% endblock %}
{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><i class="fas fa-qrcode"></i></div>
        <p class="subtitle">扫描二维码设置TOTP双因素认证</p>
        {% if qrcode %}
        <div class="text-center mb-3">
            <img src="data:image/png;base64,{{ qrcode }}" alt="TOTP QR Code" class="img-fluid" style="max-width:200px;">
        </div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label">密钥（手动输入）</label>
            <code style="word-break:break-all;background:#0f172a;padding:8px;display:block;border-radius:8px;">{{ secret }}</code>
        </div>
        <p class="subtitle">使用 Google Authenticator、Authy 或 Microsoft Authenticator 扫描二维码或手动输入密钥，然后输入验证码确认启用。</p>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.profile') }}" class="btn btn-outline-light btn-sm">返回个人设置</a>
        </div>
    </div>
</div>
{% endblock %}
