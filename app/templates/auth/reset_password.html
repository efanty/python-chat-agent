{% extends "base.html" %}
{% block title %}重置密码{% endblock %}
{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><i class="fas fa-lock"></i></div>
        <p class="subtitle">设置新密码</p>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="form-label">新密码</label>
                {{ form.password(class="form-control", placeholder="至少8个字符") }}
            </div>
            <div class="mb-3">
                <label class="form-label">确认新密码</label>
                {{ form.password2(class="form-control", placeholder="再次输入密码") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
    </div>
</div>
{% endblock %}
