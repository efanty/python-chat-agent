{% extends "base.html" %}
{% block title %}TOTP验证{% endblock %}
{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><i class="fas fa-shield-alt"></i></div>
        <p class="subtitle">请输入您的TOTP验证码</p>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="form-label">6位验证码</label>
                {{ form.code(class="form-control", placeholder="输入6位验证码", maxlength="6", autocomplete="off") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="auth-link">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}
