{% extends "base.html" %}
{% block title %}404 - 页面未找到{% endblock %}
{% block body %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div style="font-size:5rem;color:var(--primary);">404</div>
        <h4>页面未找到</h4>
        <p class="small">Page not found! 您访问的页面不存在或已被移除。</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> 返回首页</a>
    </div>
</div>
{% endblock %}
