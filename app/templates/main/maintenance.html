<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护中 - {{ site_name }}</title>
    <style>
        body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center;
               min-height: 100vh; text-align: center; }
        .container { max-width: 480px; padding: 40px 20px; }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: #94a3b8; line-height: 1.6; font-size: 15px; }
        .badge { display: inline-block; background: #334155; color: #94a3b8;
                 font-size: 12px; padding: 4px 10px; border-radius: 20px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>系统维护中</h1>
        <p>系统正在进行维护升级，暂时无法访问。<br>请稍后再试，感谢您的理解与支持。</p>
        <div class="badge">Maintenance Mode</div>
    </div>
</body>
</html>
